# Puerto estándar de Eureka Server (8761).
# Desde el navegador: http://localhost:8761
server:
  port: 8761

spring:
  application:
    name: ms-eureka

eureka:
  instance:
    hostname: localhost
  client:
    # El servidor Eureka no se registra a sí mismo como cliente.
    register-with-eureka: false
    fetch-registry: false
  server:
    # Arranque más rápido en desarrollo cuando aún no hay instancias registradas.
    wait-time-in-ms-when-sync-empty: 0
