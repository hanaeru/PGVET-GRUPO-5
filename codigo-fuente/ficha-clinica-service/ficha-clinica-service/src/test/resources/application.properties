# Base de datos en memoria para pruebas (no usa MySQL ni Docker).
spring.datasource.url=jdbc:h2:mem:pgvet_ficha_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

mascota.service.url=http://localhost:8082
usuario.service.url=http://localhost:8081
cita.service.url=http://localhost:8083

# Desactiva Eureka en tests: no requiere levantar ms-eureka.
eureka.client.enabled=false
# Evita autoconfiguración de discovery que falla en el entorno de test con Spring Boot 4.
spring.cloud.discovery.enabled=false
spring.autoconfigure.exclude=org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration
