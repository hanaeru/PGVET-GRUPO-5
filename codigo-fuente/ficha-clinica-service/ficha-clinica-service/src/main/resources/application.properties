spring.application.name=ficha-clinica-service
server.port=8084

# Habilita la generación de la especificación OpenAPI en JSON
springdoc.api-docs.enabled=true
# Habilita la interfaz Swagger UI para probar los endpoints
springdoc.swagger-ui.enabled=true
# Ruta personalizada de acceso a Swagger UI
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.datasource.url=jdbc:mysql://ficha-clinica-db:3306/ficha_clinica_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs Feign
usuario.service.url=http://usuario-service:8081
mascota.service.url=http://mascota-service:8082
cita.service.url=http://cita-service:8083

# Timeouts Feign (milisegundos)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
