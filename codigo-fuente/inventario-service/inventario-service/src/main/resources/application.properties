spring.application.name=inventario-service
server.port=8087

# Habilita la generación de la especificación OpenAPI en JSON
springdoc.api-docs.enabled=true
# Habilita la interfaz Swagger UI para probar los endpoints
springdoc.swagger-ui.enabled=true
# Ruta personalizada de acceso a Swagger UI
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.datasource.url=jdbc:mysql://inventario-db:3306/inventario_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
