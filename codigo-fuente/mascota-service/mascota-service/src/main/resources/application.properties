# Nombre lógico registrado en Eureka (el Gateway usa lb://MS-MASCOTA).
spring.application.name=MS-MASCOTA
server.port=8082

# Habilita la generación de la especificación OpenAPI en JSON
springdoc.api-docs.enabled=true
# Habilita la interfaz Swagger UI para probar los endpoints
springdoc.swagger-ui.enabled=true
# Ruta personalizada de acceso a Swagger UI
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.datasource.url=jdbc:mysql://mascota-db:3306/mascota_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs Feign (comunicación directa entre microservicios, sin pasar por Gateway)
usuario.service.url=http://usuario-service:8081

# Timeouts Feign (milisegundos)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# URL del servidor Eureka donde este microservicio se registra.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Registra la IP real de la instancia (útil en Docker y EC2).
eureka.instance.prefer-ip-address=true
