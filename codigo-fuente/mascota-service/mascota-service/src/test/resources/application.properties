# Base de datos en memoria para pruebas (no usa MySQL ni Docker).
spring.datasource.url=jdbc:h2:mem:pgvet_mascota_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

usuario.service.url=http://localhost:8081

# Desactiva Eureka en tests: no requiere levantar ms-eureka.
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
